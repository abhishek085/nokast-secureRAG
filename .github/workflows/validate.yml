name: Validate Nokast-secureRAG

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml python-dotenv
    
    - name: Check Python syntax
      run: |
        python -m py_compile src/data_gen.py
        python -m py_compile src/train_mlx.py
        python -m py_compile src/detector.py
        python -m py_compile eval/benchmark.py
    
    - name: Run validation tests
      run: |
        python validate.py
    
    - name: Test imports
      run: |
        python -c "from src.data_gen import RAGDataGenerator"
        python -c "from src.train_mlx import QwenPromptInjectionTrainer"
        python -c "from src.detector import PromptInjectionDetector"
        python -c "from eval.benchmark import BenchmarkEvaluator"
